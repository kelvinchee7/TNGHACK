name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 464817648724.dkr.ecr.ap-southeast-1.amazonaws.com
  ECS_CLUSTER: probate-platform
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build and deploy backend services
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        service: [api-gateway, will-scanner, transfer-pipeline]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Build, tag, and push Docker image
      env:
        ECR_REPOSITORY: probate-${{ matrix.service }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd services/${{ matrix.service }}
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT
    
    - name: Update ECS service
      run: |
        aws ecs update-service \
          --cluster ${{ env.ECS_CLUSTER }} \
          --service ${{ matrix.service }} \
          --force-new-deployment
    
    - name: Check service deployment
      run: |
        echo "🚀 Service ${{ matrix.service }} deployment triggered"
        aws ecs describe-services \
          --cluster ${{ env.ECS_CLUSTER }} \
          --services ${{ matrix.service }} \
          --query 'services[0].[serviceName,runningCount,desiredCount,status]' \
          --output table

  # Build and deploy frontend
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies and build
      run: |
        cd frontend
        npm ci
        npm run build
    
    - name: Deploy to S3
      run: |
        cd frontend
        aws s3 sync dist/ s3://probate-frontend-prod-464817648724 --delete
    
    - name: Invalidate CloudFront (if you have CloudFront)
      if: false  # Set to true when you have CloudFront
      run: |
        aws cloudfront create-invalidation \
          --distribution-id YOUR_DISTRIBUTION_ID \
          --paths "/*"

  # Health check
  health-check:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Wait for deployment
      run: sleep 60
    
    - name: Check service health
      run: |
        echo "Checking ECS services..."
        aws ecs describe-services \
          --cluster ${{ env.ECS_CLUSTER }} \
          --services api-gateway will-scanner transfer-pipeline \
          --query 'services[*].[serviceName,runningCount,desiredCount,status]' \
          --output table
        
        echo "Checking frontend..."
        curl -f http://probate-frontend-prod-464817648724.s3-website-ap-southeast-1.amazonaws.com || echo "Frontend check failed"

  # Notify on failure
  notify-on-failure:
    runs-on: ubuntu-latest
    if: failure()
    needs: [deploy-backend, deploy-frontend]
    
    steps:
    - name: Notify deployment failure
      run: |
        echo "🚨 Deployment failed for commit ${{ github.sha }}"
        echo "Branch: ${{ github.ref }}"
        echo "Author: ${{ github.actor }}"
        echo "Check the logs for details"
